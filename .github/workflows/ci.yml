name: ci
on:
  push:
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build
      - name: committed dist/ is up to date
        run: git diff --exit-code dist/ || (echo "::error::dist/ is stale — run 'npm run build' and commit"; exit 1)
